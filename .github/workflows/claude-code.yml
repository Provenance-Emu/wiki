name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to act on (used by copilot review poller)'
        required: true
      action:
        description: 'Action to take: fix_copilot_review or copilot_approved'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-code-${{ github.event.inputs.pr_number || github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Run when:
    # 1. @claude is mentioned in issue/PR comments
    # 2. Issues are labeled with 'agent-work'
    # 3. Issues are opened with 'agent-work' label
    # 4. @claude is mentioned in PR review comments
    # 5. PR review requests changes on an [Agent] PR (auto-fix, human reviewers)
    # 6. Comments with /claude-fix trigger fix of all review comments
    # 7. Dispatched by copilot-review-poller (Copilot review handling)
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/claude-fix')) ||
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'agent-work') ||
      (github.event_name == 'issues' &&
       github.event.action == 'opened' &&
       contains(toJSON(github.event.issue.labels.*.name), 'agent-work')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'changes_requested' &&
       startsWith(github.event.pull_request.title, '[Agent]')) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--allowedTools 'Bash(gh issue comment:*),Bash(gh pr comment:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh issue edit:*),Bash(gh label:*),Bash(gh api:*),Bash(git:*),Read,Write,Edit,Glob,Grep'"
          prompt: |
            You are working on the Provenance wiki documentation repository.
            Read CLAUDE.md for wiki conventions and structure.

            ## GitHub Context
            - Repository: ${{ github.repository }}
            - Event: ${{ github.event_name }}
            - Actor: ${{ github.actor }}
            - Issue/PR number: ${{ github.event.inputs.pr_number || github.event.issue.number || github.event.pull_request.number }}
            - Issue title: ${{ github.event.issue.title || github.event.pull_request.title || '' }}

            ## Trigger Context
            ${{ github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested' && 'A reviewer requested changes on this PR. Read all review comments and fix them.' || '' }}
            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'fix_copilot_review' && format('Copilot requested changes on PR #{0}. Read ALL review comments and fix every issue. Then re-request Copilot review.', github.event.inputs.pr_number) || '' }}
            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'copilot_approved' && format('Copilot has approved PR #{0}. Rebase against master, resolve any conflicts, add ready-for-review label, and assign @JoeMatt for final review.', github.event.inputs.pr_number) || '' }}
            ${{ contains(github.event.comment.body || '', '/claude-fix') && 'Fix all pending review comments on this PR. Read the full review, address each comment, commit fixes, and push.' || '' }}

            ## User Request
            ${{ github.event.comment.body || github.event.review.body || github.event.issue.body || '' }}

            ## Instructions
            1. Address the user's request above
            2. Post your response as a comment on the issue/PR using:
               gh issue comment <number> --body "YOUR RESPONSE"
               or for PRs:
               gh pr comment <number> --body "YOUR RESPONSE"
               The PR/issue number is: ${{ github.event.inputs.pr_number || github.event.issue.number || github.event.pull_request.number }}
            3. Target all PRs to the 'master' branch
            4. Prefix agent PR titles with '[Agent]'
            5. Keep changes focused — one logical topic per PR
            6. Maintain existing Markdown formatting, YAML frontmatter, and relative link conventions
            7. Update SUMMARY.md if adding or renaming pages
            8. Use App Store-first messaging (sideloading/building from source are "Advanced")
            9. When fixing review comments, address ALL comments in a single commit
            10. After fixing, push the changes and comment with a summary of what was fixed

            ## Review Pipeline (for [Agent] PRs)

            After creating a PR:
            11. Request Copilot code review: `gh pr edit <number> --add-reviewer copilot`
            12. Post a comment noting that Copilot review has been requested

            When fixing review comments (changes_requested trigger):
            13. Read ALL review comments using: `gh api repos/${{ github.repository }}/pulls/<number>/reviews` and `gh api repos/${{ github.repository }}/pulls/<number>/comments`
            14. Fix every issue in a single commit
            15. Push fixes and re-request Copilot review: `gh api -X POST repos/${{ github.repository }}/pulls/<number>/requested_reviewers -f "reviewers[]=copilot"`
            16. Check iteration count — count reviews from copilot[bot] via `gh api`. If this is the 4th+ fix cycle, skip re-requesting Copilot and assign for human review instead
            17. Post a comment summarizing fixes and noting re-review requested

            When Copilot approves (approved trigger from copilot[bot]):
            18. Rebase PR branch against master: `git fetch origin master && git rebase origin/master`
            19. If rebase has conflicts, resolve them (for .md files, prefer the PR branch changes)
            20. Force push the rebased branch: `git push --force-with-lease`
            21. Add the `ready-for-review` label: `gh pr edit <number> --add-label ready-for-review`
            22. Assign the repo owner for final review: `gh pr edit <number> --add-assignee JoeMatt --add-reviewer JoeMatt`
            23. Post a summary comment: "Copilot approved. Rebased against master. Ready for final human review."
