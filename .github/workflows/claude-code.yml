name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-code-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Run when:
    # 1. @claude is mentioned in issue/PR comments
    # 2. Issues are labeled with 'agent-work'
    # 3. Issues are opened with 'agent-work' label
    # 4. @claude is mentioned in PR review comments
    # 5. PR review requests changes on an [Agent] PR (auto-fix)
    # 6. Comments with /claude-fix trigger fix of all review comments
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/claude-fix')) ||
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'agent-work') ||
      (github.event_name == 'issues' &&
       github.event.action == 'opened' &&
       contains(toJSON(github.event.issue.labels.*.name), 'agent-work')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'changes_requested' &&
       startsWith(github.event.pull_request.title, '[Agent]'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: "--allowedTools 'Bash(gh issue comment:*),Bash(gh pr comment:*),Bash(gh pr create:*),Bash(gh issue edit:*),Bash(gh label:*),Bash(git:*),Read,Write,Edit,Glob,Grep'"
          prompt: |
            You are working on the Provenance wiki documentation repository.
            Read CLAUDE.md for wiki conventions and structure.

            ## GitHub Context
            - Repository: ${{ github.repository }}
            - Event: ${{ github.event_name }}
            - Actor: ${{ github.actor }}
            - Issue/PR number: ${{ github.event.issue.number || github.event.pull_request.number }}
            - Issue title: ${{ github.event.issue.title || github.event.pull_request.title }}

            ## Trigger Context
            ${{ github.event_name == 'pull_request_review' && 'A reviewer requested changes on this PR. Read all review comments and fix them.' || '' }}
            ${{ contains(github.event.comment.body || '', '/claude-fix') && 'Fix all pending review comments on this PR. Read the full review, address each comment, commit fixes, and push.' || '' }}

            ## User Request
            ${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}

            ## Instructions
            1. Address the user's request above
            2. Post your response as a comment on the issue/PR using:
               gh issue comment ${{ github.event.issue.number || github.event.pull_request.number }} --body "YOUR RESPONSE"
               or for PRs:
               gh pr comment ${{ github.event.pull_request.number || github.event.issue.number }} --body "YOUR RESPONSE"
            3. Target all PRs to the 'master' branch
            4. Prefix agent PR titles with '[Agent]'
            5. Keep changes focused — one logical topic per PR
            6. Maintain existing Markdown formatting, YAML frontmatter, and relative link conventions
            7. Update SUMMARY.md if adding or renaming pages
            8. Use App Store-first messaging (sideloading/building from source are "Advanced")
            9. When fixing review comments, address ALL comments in a single commit
            10. After fixing, push the changes and comment with a summary of what was fixed
