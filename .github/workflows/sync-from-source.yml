name: Sync from Provenance Source

on:
  # Weekly sync every Monday at 6:00 UTC
  schedule:
    - cron: '0 6 * * 1'
  # Manual trigger
  workflow_dispatch:
    inputs:
      branch:
        description: 'Provenance repo branch to sync from'
        required: false
        default: 'develop'
        type: choice
        options:
          - develop
          - master
  # Can be triggered from the Provenance app repo via repository_dispatch
  repository_dispatch:
    types: [sync-wiki]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout wiki repo
        uses: actions/checkout@v4

      - name: Checkout Provenance source
        uses: actions/checkout@v4
        with:
          repository: Provenance-Emu/Provenance
          ref: ${{ inputs.branch || 'develop' }}
          path: provenance-source
          sparse-checkout: |
            PVLibrary/Sources/PVLibrary/Resources/systems.plist
            PVCoreLoader/Sources/PVCoreLoader/Resources/systems.plist
            Cores
            CoresRetro
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run sync script
        run: python3 scripts/sync-from-source.py provenance-source .

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet info/system-reference.md 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in system-reference.md"
          fi

      - name: Create PR with changes
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="auto/sync-from-source-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add info/system-reference.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-sync system reference from Provenance source

          Updated systems, cores, BIOS requirements, file extensions,
          cheat support, and skin identifiers from source code.

          Source branch: ${{ inputs.branch || 'develop' }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "[Auto] Sync system reference from Provenance source" \
            --body "$(cat <<'EOF'
          ## Auto-generated update

          This PR was created by the [sync-from-source workflow](https://github.com/Provenance-Emu/wiki/actions/workflows/sync-from-source.yml).

          **What changed:** The `info/system-reference.md` page was regenerated from the Provenance app repository's `Systems.plist` and `Core.plist` files.

          **Source branch:** `${{ inputs.branch || 'develop' }}`

          **Review checklist:**
          - [ ] System count looks correct
          - [ ] BIOS MD5 hashes are present
          - [ ] Core versions are reasonable
          - [ ] No formatting issues in tables

          ---
          *Auto-generated by GitHub Actions*
          EOF
          )" \
            --base master \
            --head "$BRANCH"
