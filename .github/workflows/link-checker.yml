name: Link Checker

on:
  push:
    branches: [master]
    paths: ['**/*.md', '.github/workflows/link-checker.yml', '.cspell/**']
  pull_request:
    paths: ['**/*.md', '.github/workflows/link-checker.yml']
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check internal markdown links
        shell: bash
        run: |
          errors=0

          while IFS= read -r file; do
            dir=$(dirname "$file")

            # Extract markdown links: [text](path) — skip external URLs, anchors-only, and images
            while IFS= read -r match; do
              # Extract the path from [text](path#anchor)
              link=$(echo "$match" | sed 's/.*](\([^)]*\))/\1/' | sed 's/#.*//' | sed 's/?.*//')

              # Skip empty links (anchor-only after stripping)
              [ -z "$link" ] && continue

              # Resolve relative path
              target="$dir/$link"

              if [ ! -f "$target" ] && [ ! -d "$target" ]; then
                echo "::error file=${file#./}::Broken link: $match -> target not found: $target"
                errors=$((errors + 1))
              fi
            done < <(grep -oP '\[(?!\!)[^\]]*\]\((?!https?://|mailto:|#)[^)]+\)' "$file" 2>/dev/null || true)
          done < <(find . -name '*.md' -not -path './.git/*')

          echo "---"
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors broken internal link(s)"
            exit 1
          else
            echo "All internal links are valid"
          fi
