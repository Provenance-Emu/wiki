name: Link Checker

on:
  push:
    branches: [master]
    paths: ['**/*.md']
  pull_request:
    paths: ['**/*.md']

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check internal markdown links
        run: |
          #!/bin/bash
          set -euo pipefail

          errors=0
          warnings=0

          # Collect all markdown files
          mapfile -t md_files < <(find . -name '*.md' -not -path './.git/*')

          echo "Checking internal links in ${#md_files[@]} markdown files..."
          echo ""

          for file in "${md_files[@]}"; do
            dir=$(dirname "$file")

            # Extract markdown links: [text](path) — skip external URLs, anchors-only, and images
            grep -oP '\[(?!\!)[^\]]*\]\((?!https?://|mailto:|#)[^)]+\)' "$file" 2>/dev/null | while read -r match; do
              # Extract the path from [text](path#anchor)
              link=$(echo "$match" | sed 's/.*](\([^)]*\))/\1/' | sed 's/#.*//' | sed 's/?.*//')

              # Skip empty links (anchor-only after stripping)
              [ -z "$link" ] && continue

              # Resolve relative path
              target="$dir/$link"

              # Normalize path (remove ./ and resolve ../)
              target=$(cd "$(dirname "$target")" 2>/dev/null && echo "$(pwd)/$(basename "$target")" || echo "$target")

              if [ ! -f "$target" ] && [ ! -d "$target" ]; then
                echo "::error file=${file#./}::Broken link: $match -> target not found"
                errors=$((errors + 1))
              fi
            done
          done

          echo ""
          echo "---"
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors broken internal link(s)"
            exit 1
          else
            echo "All internal links are valid"
          fi
