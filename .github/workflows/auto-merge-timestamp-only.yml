name: Auto-merge timestamp-only PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if PR is timestamp-only changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Get the diff of the PR
          git diff "$BASE_SHA" "$HEAD_SHA" > /tmp/pr.diff

          # Check: are ALL changed lines only date/timestamp frontmatter?
          # Strip lines that are purely timestamp changes (date: YYYY-MM-DD...)
          # A timestamp-only PR should have no other +/- content lines
          NON_TIMESTAMP=$(grep -E '^[+-]' /tmp/pr.diff \
            | grep -v '^---' \
            | grep -v '^+++' \
            | grep -vE '^[+-]date: [0-9]{4}-[0-9]{2}-[0-9]{2}' \
            | grep -vE '^[+-]last_modified_at: ' \
            | grep -vE '^[+-]updated: ' \
            | grep -vE '^[+-]lastmod: ' \
            | wc -l | tr -d ' ')

          echo "Non-timestamp changed lines: $NON_TIMESTAMP"
          echo "non_timestamp=$NON_TIMESTAMP" >> "$GITHUB_OUTPUT"

          if [ "$NON_TIMESTAMP" -eq 0 ]; then
            echo "timestamp_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "timestamp_only=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-merge if timestamp-only
        if: steps.check.outputs.timestamp_only == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "PR #$PR_NUMBER contains only timestamp changes — auto-merging."
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --subject "chore: auto-merge timestamp-only PR #$PR_NUMBER" \
            --delete-branch
